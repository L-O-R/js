<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body>
    <main>
        <header>
            <h2>My Task Manager</h2>
            <button command="show-modal" commandfor="dialog_box">Add Task</button>
        </header>

        <div>

        </div>

        <div class="task-list">
            <ul id="tasks">
                <!-- Tasks will be added here -->
            </ul>

        </div>
    </main>


    <!-- dialog box -->

    <dialog id="dialog_box">
        <button commandfor="dialog_box" command="close">X</button>
        <form action="">
            <input type="text" placeholder="Enter your task here" id="task-input">
            <button type="submit" id="add_task_btn">Add Task</button>
        </form>
    </dialog>
    <script src="./script.js"></script>
</body>

</html>
